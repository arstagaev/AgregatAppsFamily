# Host-level nginx vhost for public HTTPS domain.
# Forwards all requests to dockerized app on localhost:8444 (TLS).
#
# Install to: /etc/nginx/conf.d/crm.agregatka.ru.conf
# Validate/reload:
#   sudo nginx -t && sudo systemctl reload nginx
#

server {
    listen 443 ssl http2;
    server_name crm.agregatka.ru;

    ssl_certificate     /etc/letsencrypt/live/crm.agregatka.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crm.agregatka.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 10m;

    # Shared proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_http_version 1.1;
    proxy_ssl_server_name on;
    proxy_ssl_verify off;
    proxy_redirect off;
    proxy_connect_timeout 30s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Single-hop passthrough to dockerized web app.
    # Container serves both SPA files and /api proxy.
    location / {
        proxy_pass https://127.0.0.1:8444;
    }
}

server {
    listen 80;
    server_name crm.agregatka.ru;
    return 301 https://$host$request_uri;
}
