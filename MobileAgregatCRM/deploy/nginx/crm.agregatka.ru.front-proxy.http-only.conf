# Host-level nginx vhost for public HTTP domain (no TLS).
# Forwards all requests to dockerized app on localhost:8444 (TLS).
#
# Install to: /etc/nginx/conf.d/crm.agregatka.ru.conf
# Then: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name crm.agregatka.ru;

    client_max_body_size 10m;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto http;
    proxy_http_version 1.1;
    proxy_ssl_server_name on;
    proxy_ssl_verify off;
    proxy_redirect off;
    proxy_connect_timeout 30s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Single-hop passthrough to dockerized web app.
    # Container serves both SPA files and /api proxy.
    location / {
        proxy_pass https://127.0.0.1:8444;
    }
}
