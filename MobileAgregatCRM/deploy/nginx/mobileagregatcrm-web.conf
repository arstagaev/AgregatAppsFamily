# /etc/nginx/conf.d/mobileagregatcrm-web.conf
#
# Deploy steps:
# 1) Build: ./gradlew :composeApp:wasmJsBrowserDistribution
# 2) Copy:  composeApp/build/dist/wasmJs/productionExecutable/* -> /var/www/mobileagregatcrm-web/
# 3) Set your real domain and cert paths below.
#
server {
    listen 8444 ssl http2;
    server_name your-domain.example;

    root /var/www/mobileagregatcrm-web;
    index index.html;

    ssl_certificate     /etc/letsencrypt/live/your-domain.example/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.example/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 10m;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location = /healthz {
        default_type text/plain;
        return 200 "ok\n";
    }

    # Keep hashed assets cached.
    location ~* \.(js|mjs|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # Explicit MIME for wasm.
    location ~* \.wasm$ {
        default_type application/wasm;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # Browser cannot call backend directly (CORS), so proxy same-origin /api.
    # Handle both /api and /api/ without redirect to avoid mixed-content issues.
    location = /api {
        proxy_pass https://agrapp.agregatka.ru/;
        proxy_http_version 1.1;
        proxy_set_header Host agrapp.agregatka.ru;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /api/ {
        proxy_pass https://agrapp.agregatka.ru/;
        proxy_http_version 1.1;
        proxy_set_header Host agrapp.agregatka.ru;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
